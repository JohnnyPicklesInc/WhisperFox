name = "whisperfox"
compatibility_date = "2024-11-01"
pages_build_output_dir = "public"

# Non-secret config. Secrets (ROOT_PEPPER) come from `.dev.vars` locally and
# `wrangler pages secret put <NAME>` in production.
[vars]
# Leave empty to serve a built-in first-party "house" ad. Set to your
# EthicalAds publisher id to serve real (privacy-first, server-fetched) ads.
ETHICALADS_PUBLISHER = ""

# Holds the hourly random roots (content-free, self-erasing via TTL).
# Create with `wrangler kv namespace create whisperfox-roots` and paste the id
# below. `wrangler pages dev` simulates the namespace locally and never
# contacts the real one, so any placeholder works for local dev.
[[kv_namespaces]]
binding = "ROOT_KV"
id = "cc9c8dc5f9464ce9b1ece4b0f3275b07"
